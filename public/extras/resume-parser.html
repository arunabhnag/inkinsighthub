<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #111827;
    --card: #1e2d3d;
    --card-hover: #243448;
    --border: #2a3f55;
    --gold: #c9a84c;
    --gold-dim: #8a6f33;
    --gold-glow: rgba(201,168,76,0.12);
    --text: #c8d8e8;
    --text-dim: #6b8099;
    --text-bright: #e8f0f8;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* ── UPLOAD ─────────────────────────────────────────── */
  #upload-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    position: relative; overflow: hidden;
  }
  #upload-screen::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(74,158,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .upload-eyebrow { font-family: var(--mono); font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; opacity: 0; animation: fadeUp .6s .1s forwards; }
  .upload-title   { font-family: var(--serif); font-size: clamp(2.8rem,6vw,5rem); font-weight: 300; color: var(--text-bright); text-align: center; line-height: 1.1; margin-bottom: .5rem; opacity: 0; animation: fadeUp .6s .2s forwards; }
  .upload-title em { font-style: italic; color: var(--gold); }
  .upload-sub  { font-size: .85rem; color: var(--text-dim); text-align: center; margin-bottom: 3rem; opacity: 0; animation: fadeUp .6s .3s forwards; }
  .drop-zone {
    width: 100%; max-width: 520px; border: 1px solid var(--border); border-radius: 6px;
    padding: 3rem 2rem; text-align: center; cursor: pointer; background: var(--card);
    transition: all .25s; opacity: 0; animation: fadeUp .6s .4s forwards;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold-dim); background: var(--card-hover); box-shadow: 0 0 40px var(--gold-glow); }
  .drop-zone input[type="file"] { display: none; }
  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
  .drop-zone h3 { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--text-bright); margin-bottom: .4rem; }
  .drop-zone p  { font-family: var(--mono); font-size: .68rem; color: var(--text-dim); letter-spacing: .06em; }
  .upload-note { margin-top: 1.5rem; font-family: var(--mono); font-size: .65rem; color: var(--text-dim); letter-spacing: .08em; opacity: 0; animation: fadeUp .6s .5s forwards; }
  .upload-note span { color: var(--gold); }
  #error-box { display: none; background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.25); border-radius: 4px; padding: 1rem 1.5rem; margin-top: 1rem; font-family: var(--mono); font-size: .75rem; color: #ff8080; max-width: 520px; width: 100%; }
  #error-box.visible { display: block; }

  /* ── LOADING ────────────────────────────────────────── */
  #loading-screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  #loading-screen.visible { display: flex; }
  .loading-glyph { font-family: var(--serif); font-size: 4rem; color: var(--gold); animation: breathe 2s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:.4;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
  .loading-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); }
  .loading-progress { width: 200px; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .loading-bar { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); animation: loadBar 2s ease-in-out infinite; transform-origin: left; }
  @keyframes loadBar { 0%{transform:scaleX(0)} 50%{transform:scaleX(.8)} 100%{transform:scaleX(0) translateX(200%)} }

  /* ── EDITOR SCREEN ──────────────────────────────────── */
  #editor-screen { display: none; min-height: 100vh; flex-direction: column; }
  #editor-screen.visible { display: flex; }

  .editor-topbar {
    position: sticky; top: 0; z-index: 100;
    background: #0d1520; border-bottom: 1px solid var(--border);
    padding: .9rem 1.5rem;
    display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
  }

  .topbar-brand { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--gold); margin-right: auto; white-space: nowrap; }

  .tb-btn {
    display: flex; align-items: center; gap: .4rem;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono);
    font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
    padding: .45rem .9rem; cursor: pointer; border-radius: 3px; transition: all .2s;
    white-space: nowrap;
  }
  .tb-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .tb-btn.primary { border-color: var(--gold-dim); color: var(--gold); background: rgba(201,168,76,.07); }
  .tb-btn.primary:hover { background: rgba(201,168,76,.14); }
  .tb-btn .btn-icon { font-size: .75rem; }

  .tb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  /* Editor body */
  .editor-body {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  @media (max-width: 700px) { .editor-body { grid-template-columns: 1fr; } }

  .pane {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-height: 0; overflow: hidden;
  }
  .pane:last-child { border-right: none; }

  .pane-header {
    padding: .55rem 1.2rem; background: #0d1520;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .5rem;
    font-family: var(--mono); font-size: .58rem; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text-dim); flex-shrink: 0;
  }
  .pane-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pane-dot.gold { background: var(--gold); }
  .pane-dot.teal { background: #2dd4bf; }

  #md-editor {
    flex: 1; resize: none; border: none; outline: none;
    background: #0d1825; color: var(--text);
    font-family: var(--mono); font-size: .78rem; line-height: 1.7;
    padding: 1.5rem; tab-size: 2;
    min-height: 0; overflow-y: auto;
  }

  #preview-pane {
    flex: 1; overflow-y: auto;
    padding: 2rem 2.5rem 4rem;
    background: var(--bg);
  }

  /* ── RESUME STYLES (inside preview) ────────────────── */
  .resume-header { margin-bottom: 2.5rem; padding-bottom: 1.8rem; border-bottom: 1px solid var(--border); }
  .resume-eyebrow { font-family: var(--mono); font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: .6rem; }
  .resume-name { font-family: var(--serif); font-size: clamp(2rem,4vw,3.2rem); font-weight: 300; color: var(--text-bright); line-height: 1.05; margin-bottom: .3rem; position: relative; display: inline-block; }
  .resume-name::after { content: ''; position: absolute; left: 0; bottom: -3px; width: 100%; height: 2px; background: var(--gold); }
  .resume-title-line { font-family: var(--serif); font-style: italic; font-size: 1.1rem; color: var(--text-dim); margin: .5rem 0 .9rem; display: block; }
  .resume-contact { display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; }
  .contact-item { display: flex; align-items: center; gap: .35rem; font-family: var(--mono); font-size: .7rem; color: var(--text-dim); }
  .contact-item .ci-icon { color: var(--gold); }

  .tiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1rem; }

  .tile { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1.4rem 1.6rem; position: relative; overflow: hidden; transition: border-color .2s, background .2s; opacity: 0; transform: translateY(12px); }
  .tile.wide { grid-column: 1 / -1; }
  .tile.revealed { animation: tileIn .4s ease forwards; }
  @keyframes tileIn { to { opacity: 1; transform: translateY(0); } }
  .tile:hover { border-color: var(--gold-dim); background: var(--card-hover); }
  .tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent,var(--gold-dim),transparent); opacity: 0; transition: opacity .2s; }
  .tile:hover::before { opacity: 1; }

  .tile-label { font-family: var(--mono); font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: .9rem; }
  .summary-text { font-size: .87rem; line-height: 1.75; color: var(--text); }

  .bullet-list { list-style: none; }
  .bullet-list li { display: flex; align-items: flex-start; gap: .5rem; padding: .3rem 0; font-size: .84rem; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); }
  .bullet-list li:last-child { border-bottom: none; }
  .bullet-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: .42em; }

  .exp-entry { padding: .85rem 0; border-bottom: 1px solid rgba(255,255,255,.05); }
  .exp-entry:first-child { padding-top: 0; }
  .exp-entry:last-child { border-bottom: none; padding-bottom: 0; }
  .exp-role { font-family: var(--serif); font-size: .98rem; font-weight: 600; color: var(--text-bright); margin-bottom: .1rem; }
  .exp-company { font-size: .76rem; color: var(--gold); font-family: var(--mono); letter-spacing: .04em; margin-bottom: .12rem; }
  .exp-dates { font-family: var(--mono); font-size: .63rem; color: var(--text-dim); letter-spacing: .06em; margin-bottom: .45rem; }
  .exp-desc { font-size: .79rem; line-height: 1.65; color: var(--text); }

  .edu-entry { margin-bottom: .9rem; }
  .edu-entry:last-child { margin-bottom: 0; }
  .edu-degree { font-family: var(--serif); font-size: .98rem; font-weight: 600; color: var(--text-bright); margin-bottom: .12rem; line-height: 1.3; }
  .edu-school { font-family: var(--mono); font-size: .68rem; color: var(--text-dim); letter-spacing: .04em; margin-bottom: .08rem; }
  .edu-year { font-family: var(--mono); font-size: .63rem; color: var(--gold-dim); }

  .pill-row { display: flex; flex-wrap: wrap; gap: .35rem; }
  .pill { background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.2); color: var(--text); font-family: var(--mono); font-size: .63rem; padding: .18rem .55rem; border-radius: 20px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @media (max-width: 560px) { .tiles-grid { grid-template-columns: 1fr; } .tile.wide { grid-column: auto; } }
</style>
</head>
<body>

<!-- ── UPLOAD ── -->
<div id="upload-screen">
  <p class="upload-eyebrow">Resume · Parser</p>
  <h1 class="upload-title">Drop your <em>résumé.</em></h1>
  <p class="upload-sub">PDF → Markdown → Tiled HTML · 100% in your browser</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf"/>
    <span class="drop-icon">📄</span>
    <h3>Drop PDF here</h3>
    <p>or click to browse · .pdf files only</p>
  </div>
  <div id="error-box"></div>
  <p class="upload-note"><span>Client-side only</span> · PDF.js + marked.js · no data leaves your device</p>
</div>

<!-- ── LOADING ── -->
<div id="loading-screen">
  <div class="loading-glyph">✦</div>
  <p class="loading-label" id="loading-label">Reading PDF...</p>
  <div class="loading-progress"><div class="loading-bar"></div></div>
</div>

<!-- ── EDITOR + PREVIEW ── -->
<div id="editor-screen">

  <div class="editor-topbar">
    <span class="topbar-brand">résumé</span>

    <button class="tb-btn" onclick="downloadPDF()">
      <span class="btn-icon">⬇</span> Download PDF Resume
    </button>
    <button class="tb-btn" onclick="downloadMD()">
      <span class="btn-icon">⬇</span> Download MD Resume
    </button>
    <button class="tb-btn primary" onclick="downloadHTML()">
      <span class="btn-icon">⬇</span> Download HTML Resume
    </button>

    <div class="tb-divider"></div>
    <button class="tb-btn" onclick="resetAll()">↩ New Resume</button>
  </div>

  <div class="editor-body">
    <div class="pane">
      <div class="pane-header"><span class="pane-dot gold"></span>Markdown — edit freely</div>
      <textarea id="md-editor" spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header"><span class="pane-dot teal"></span>Preview — live render</div>
      <div id="preview-pane"></div>
    </div>
  </div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ─────────────────────────────────────────────
let originalPDFBytes = null;
let originalFileName = 'resume';

// ── DOM ───────────────────────────────────────────────
const uploadScreen  = document.getElementById('upload-screen');
const loadingScreen = document.getElementById('loading-screen');
const editorScreen  = document.getElementById('editor-screen');
const mdEditor      = document.getElementById('md-editor');
const previewPane   = document.getElementById('preview-pane');
const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const errorBox      = document.getElementById('error-box');
const loadingLabel  = document.getElementById('loading-label');

// ── Drop zone ─────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) go(e.target.files[0]); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) go(e.dataTransfer.files[0]);
});

// Live re-render on edit
mdEditor.addEventListener('input', () => renderPreview(mdEditor.value));

// ── Main flow ─────────────────────────────────────────
async function go(file) {
  showError('');
  originalFileName = file.name.replace(/\.pdf$/i, '');
  uploadScreen.style.display = 'none';
  loadingScreen.classList.add('visible');

  try {
    setLoading('Extracting text from PDF...');
    const buf = await file.arrayBuffer();
    originalPDFBytes = buf.slice(0); // store original for download

    const { lines, meta } = await extractText(buf);

    setLoading('Converting to Markdown...');
    await sleep(150);
    const md = pdfToMarkdown(lines, meta);

    setLoading('Rendering preview...');
    await sleep(150);

    mdEditor.value = md;
    loadingScreen.classList.remove('visible');
    editorScreen.classList.add('visible');
    renderPreview(md);

  } catch(err) {
    loadingScreen.classList.remove('visible');
    uploadScreen.style.display = '';
    showError('Error: ' + err.message);
  }
}

function setLoading(msg) { loadingLabel.textContent = msg; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═════════════════════════════════════════════════════
// STEP 1 — PDF → raw annotated lines
// ═════════════════════════════════════════════════════
async function extractText(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const allLines = [];
  const fontSizes = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Group PDF items into visual lines by y-position
    const byY = {};
    for (const item of content.items) {
      if (!item.str.trim()) continue;
      const y = Math.round(item.transform[5]);
      if (!byY[y]) byY[y] = [];
      byY[y].push(item);
    }

    const ys = Object.keys(byY).map(Number).sort((a, b) => b - a);
    for (const y of ys) {
      const items = byY[y].sort((a, b) => a.transform[4] - b.transform[4]);
      const text  = items.map(i => i.str).join(' ').replace(/\s+/g, ' ').trim();
      const size  = Math.max(...items.map(i => Math.abs(i.transform[3]) || 10));
      const bold  = items.some(i => i.fontName && /bold|heavy|black/i.test(i.fontName));
      if (text) {
        allLines.push({ text, size, bold, y, page: p });
        fontSizes.push(size);
      }
    }
  }

  const sorted = [...fontSizes].sort((a, b) => a - b);
  const median = sorted[Math.floor(sorted.length / 2)] || 10;
  const p75    = sorted[Math.floor(sorted.length * 0.75)] || 12;

  return { lines: allLines, meta: { median, p75 } };
}

// ═════════════════════════════════════════════════════
// STEP 2 — raw lines → Markdown
// ═════════════════════════════════════════════════════

const SECTION_RE = {
  summary:        /^(summary|profile|about( me)?|objective|professional\s+summary|career\s+summary|overview)$/i,
  experience:     /^(experience|work\s+experience|employment|work\s+history|professional\s+experience|career\s+history)$/i,
  education:      /^(education|academic|qualifications|educational\s+background)$/i,
  skills:         /^(skills|technical\s+skills|core\s+skills|key\s+skills|technologies|tools)$/i,
  competencies:   /^(competencies|core\s+competencies|areas\s+of\s+expertise|expertise|strengths)$/i,
  certifications: /^(certifications?|certificates?|credentials|accreditations?|licenses?)$/i,
  projects:       /^(projects?|personal\s+projects?|key\s+projects?|portfolio)$/i,
  awards:         /^(awards?|honors?|honours?|achievements?|recognition)$/i,
  languages:      /^(languages?)$/i,
  volunteer:      /^(volunteer(ing)?|community|extracurricular|activities)$/i,
  publications:   /^(publications?|papers?|research)$/i,
};

// Date range anywhere in a string
const DATE_RANGE_RE = /((jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s*\d{4}|\b\d{4}\b)\s*[-–—to]+\s*((jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s*\d{4}|\b\d{4}\b|present|current|now)/gi;
const YEAR_RE       = /\b(19|20)\d{2}\b/;
const EMAIL_RE      = /[\w.+\-]+@[\w\-]+\.[a-z]{2,}/i;
const PHONE_RE      = /(\+?1?\s*[\-.]?\(?\d{3}\)?[\s\-.]?\d{3}[\s\-.]?\d{4}|\+\d[\d\s\-]{7,14}\d)/;
const LINKEDIN_RE   = /linkedin\.com\/in\/[\w\-]+/i;
const GITHUB_RE     = /github\.com\/[\w\-]+/i;
const URL_RE        = /https?:\/\/[\w.\-\/]+/i;

function isSectionHeading(line, meta) {
  const t = line.text.trim();
  if (t.length > 60) return null;
  const isLarge  = line.size >= meta.p75 * 0.95;
  const isAllCap = t === t.toUpperCase() && t.replace(/\s/g,'').length > 2;
  const isBold   = line.bold;
  for (const [key, re] of Object.entries(SECTION_RE)) {
    if (re.test(t) && (isLarge || isAllCap || isBold)) return key;
  }
  return null;
}

function isJobBoundary(text) {
  // All-caps role with optional semicolon / company separator, followed by date info in same text block
  // OR a line that is all-caps short and looks like a role title
  const t = text.trim();
  const isAllCaps = t === t.toUpperCase() && /[A-Z]{3}/.test(t) && t.length < 80;
  const hasDate   = DATE_RANGE_RE.test(t);
  DATE_RANGE_RE.lastIndex = 0;
  return isAllCaps || hasDate;
}

function pdfToMarkdown(lines, meta) {
  const md = [];

  // ── Split into sections ──────────────────────────────
  const sections = {};
  let curSection = 'header';
  let curLines   = [];

  for (const line of lines) {
    const sec = isSectionHeading(line, meta);
    if (sec) {
      sections[curSection] = (sections[curSection] || []).concat(curLines);
      curSection = sec;
      curLines   = [];
    } else {
      curLines.push(line);
    }
  }
  sections[curSection] = (sections[curSection] || []).concat(curLines);

  // ── Header → name + contact block ───────────────────
  const headerLines = (sections.header || []).map(l => l.text);
  let name = '', title = '', contacts = [];
  let nameFound = false;

  for (const t of headerLines) {
    if (!t.trim()) continue;
    if (EMAIL_RE.test(t))    { contacts.push('✉ ' + t.match(EMAIL_RE)[0]); continue; }
    if (LINKEDIN_RE.test(t)) { contacts.push('↗ ' + t.match(LINKEDIN_RE)[0]); continue; }
    if (GITHUB_RE.test(t))   { contacts.push('⌥ ' + t.match(GITHUB_RE)[0]); continue; }
    if (URL_RE.test(t))      { contacts.push('⊕ ' + t.match(URL_RE)[0]); continue; }
    if (PHONE_RE.test(t))    { contacts.push('◎ ' + t.match(PHONE_RE)[0]); continue; }
    if (!name && !nameFound && t.length < 60 && /^[A-Z]/.test(t) && !/[@\/\d•]/.test(t)) {
      name = t; nameFound = true; continue;
    }
    if (nameFound && !title && t.length < 100 && !YEAR_RE.test(t) && !EMAIL_RE.test(t)) {
      title = t; continue;
    }
    if (t.length < 80 && /,/.test(t) && /[A-Z]/.test(t)) {
      contacts.push('◈ ' + t); continue;
    }
  }

  md.push(`# ${name || 'Resume'}`);
  if (title) md.push(`> ${title}`);
  if (contacts.length) md.push('\n' + contacts.join('  \n'));
  md.push('');

  // ── Summary ──────────────────────────────────────────
  if (sections.summary?.length) {
    md.push('## Summary');
    md.push((sections.summary).map(l => l.text).join(' ').trim());
    md.push('');
  }

  // ── Experience ───────────────────────────────────────
  if (sections.experience?.length) {
    md.push('## Experience');
    const expText = sections.experience.map(l => l.text);
    const entries = splitExperienceEntries(expText);
    for (const entry of entries) {
      md.push(`### ${entry.role}`);
      if (entry.company) md.push(`**${entry.company}**`);
      if (entry.dates)   md.push(`*${entry.dates}*`);
      if (entry.desc)    md.push('');
      if (entry.desc)    md.push(entry.desc);
      md.push('');
    }
  }

  // ── Education ────────────────────────────────────────
  if (sections.education?.length) {
    md.push('## Education');
    const eduEntries = splitEducationEntries(sections.education.map(l => l.text));
    for (const e of eduEntries) {
      md.push(`### ${e.degree}`);
      if (e.school) md.push(`**${e.school}**`);
      if (e.year)   md.push(`*${e.year}*`);
      md.push('');
    }
  }

  // ── List sections ────────────────────────────────────
  const listSections = {
    skills:         'Skills',
    competencies:   'Core Competencies',
    certifications: 'Certifications',
    languages:      'Languages',
    awards:         'Awards & Honours',
    volunteer:      'Volunteer',
    publications:   'Publications',
  };

  for (const [key, label] of Object.entries(listSections)) {
    if (sections[key]?.length) {
      md.push(`## ${label}`);
      const items = extractListItems(sections[key].map(l => l.text));
      items.forEach(item => md.push(`- ${item}`));
      md.push('');
    }
  }

  // ── Projects ─────────────────────────────────────────
  if (sections.projects?.length) {
    md.push('## Projects');
    const projEntries = splitProjects(sections.projects.map(l => l.text));
    for (const p of projEntries) {
      md.push(`### ${p.name}`);
      if (p.desc) md.push(p.desc);
      md.push('');
    }
  }

  return md.join('\n');
}

// ── Experience: split a text block into individual job entries ──
function splitExperienceEntries(lines) {
  // Join all lines into one string — handles PDFs that run everything together
  const fullText = lines.join(' ');

  // Strategy: find all-caps job title boundaries OR date-range boundaries
  // Pattern: ALL CAPS TITLE (optional ; SUBTITLE) , Date – Date Location Description
  // We'll scan word by word looking for transition points

  const entries = [];

  // Split on all-caps sequences that look like role titles
  // A role boundary: sequence of 2+ words in ALL CAPS (possibly with ; or ,)
  // followed eventually by a date range
  const roleTitleRe = /\b([A-Z][A-Z\s,;\/&\-]{4,60}?)(?=\s*[,;]?\s*(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\d{4}|,\s*[A-Z][a-z]))/g;

  // Find all candidate split points
  const splits = [];
  let m;
  while ((m = roleTitleRe.exec(fullText)) !== null) {
    const candidate = m[1].trim();
    // Must look like a real role (not just random caps)
    if (candidate.split(/\s+/).length >= 2 || candidate.length > 8) {
      splits.push({ index: m.index, role: candidate });
    }
  }

  if (splits.length === 0) {
    // Fallback: treat entire block as one entry
    return [{ role: 'Experience', company: '', dates: extractDates(fullText), desc: fullText.replace(DATE_RANGE_RE, '').trim() }];
  }

  for (let i = 0; i < splits.length; i++) {
    const start = splits[i].index;
    const end   = splits[i + 1] ? splits[i + 1].index : fullText.length;
    const chunk = fullText.slice(start, end).trim();

    const role    = splits[i].role.trim().replace(/[,;]\s*$/, '');
    const rest    = chunk.slice(role.length).trim();

    // Extract dates from chunk
    const dateMatch = [...rest.matchAll(DATE_RANGE_RE)];
    DATE_RANGE_RE.lastIndex = 0;
    const dates   = dateMatch.length ? dateMatch[0][0] : '';

    // Try to find company name: text before first date, after role
    let afterRole = rest;
    let company   = '';
    if (dates) {
      const beforeDate = rest.slice(0, rest.indexOf(dates)).trim().replace(/^[,;\s]+/, '').replace(/[,;\s]+$/, '');
      // Company is usually short and not a date
      if (beforeDate.length < 60 && !YEAR_RE.test(beforeDate)) company = beforeDate;
      afterRole = rest.slice(rest.indexOf(dates) + dates.length).trim();
    }

    entries.push({ role, company, dates, desc: afterRole.replace(/^[,.\s]+/, '') });
  }

  return entries.filter(e => e.role);
}

function extractDates(text) {
  const m = text.match(DATE_RANGE_RE);
  DATE_RANGE_RE.lastIndex = 0;
  return m ? m[0] : '';
}

// ── Education splitter ───────────────────────────────
function splitEducationEntries(lines) {
  const degreeRe = /\b(bachelor|master|doctor|phd|b\.?sc|m\.?sc|b\.?e|m\.?e|b\.?a|m\.?b\.?a|associate|diploma|certificate|bs|ms|ba|ma)\b/i;
  const entries  = [];
  let cur        = null;

  function flush() { if (cur) entries.push(cur); cur = null; }

  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    const years = (t.match(/\b(19|20)\d{2}\b/g) || []);

    if (degreeRe.test(t)) {
      flush();
      cur = { degree: t, school: '', year: years[0] || '' };
    } else if (cur && !cur.school && !years.length && t.length < 100) {
      cur.school = t;
    } else if (cur && !cur.year && years.length) {
      cur.year = years[0];
    } else if (!cur) {
      cur = { degree: t, school: '', year: years[0] || '' };
    }
  }
  flush();
  return entries.filter(e => e.degree);
}

// ── List items extractor ─────────────────────────────
function extractListItems(lines) {
  const items = [];
  for (const line of lines) {
    const t = line.trim().replace(/^[•\-–*▪▸◆►]\s*/, '');
    if (!t) continue;
    if (/[•|·▪◆]/.test(t)) {
      t.split(/[•|·▪◆]/).map(s=>s.trim()).filter(Boolean).forEach(s => items.push(s));
    } else if (t.split(',').length > 2) {
      t.split(',').map(s=>s.trim()).filter(Boolean).forEach(s => items.push(s));
    } else if (t.split(/\s{3,}/).length > 1) {
      t.split(/\s{3,}/).map(s=>s.trim()).filter(Boolean).forEach(s => items.push(s));
    } else {
      items.push(t);
    }
  }
  return [...new Set(items)];
}

// ── Projects splitter ────────────────────────────────
function splitProjects(lines) {
  const projects = [];
  let cur = null; let desc = [];
  function flush() { if (cur) { cur.desc = desc.join(' ').trim(); projects.push(cur); } cur = null; desc = []; }
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (!cur || (t.length < 80 && !/^[•\-]/.test(t) && desc.length > 0)) {
      flush(); cur = { name: t.replace(/^[•\-]\s*/, ''), desc: '' };
    } else { desc.push(t.replace(/^[•\-]\s*/, '')); }
  }
  flush();
  return projects.filter(p => p.name);
}

// ═════════════════════════════════════════════════════
// STEP 3 — Markdown → tiled HTML (live preview)
// ═════════════════════════════════════════════════════
function renderPreview(md) {
  const tokens = marked.lexer(md);
  const data   = mdToData(tokens);
  previewPane.innerHTML = buildHTML(data);

  // Stagger tile animations
  const tiles = previewPane.querySelectorAll('.tile');
  tiles.forEach((t, i) => {
    t.style.animationDelay = (0.04 + i * 0.06) + 's';
    requestAnimationFrame(() => t.classList.add('revealed'));
  });
}

function mdToData(tokens) {
  const data = { name:'', title:'', contacts:[], sections:[] };
  let curSection = null;
  let curContent = [];

  function flushSection() {
    if (curSection) data.sections.push({ title: curSection, content: [...curContent] });
    curSection = null; curContent = [];
  }

  for (const tok of tokens) {
    if (tok.type === 'heading' && tok.depth === 1) {
      data.name = tok.text;
    } else if (tok.type === 'blockquote') {
      data.title = tok.tokens?.[0]?.tokens?.[0]?.text || tok.text || '';
    } else if (tok.type === 'paragraph' && !curSection) {
      // Contact lines before any ## section
      const lines = tok.raw.split(/\n|  \n/).map(l=>l.trim()).filter(Boolean);
      lines.forEach(l => { if (l.match(/^[✉◎◈↗⌥⊕·]/)) data.contacts.push(l); });
    } else if (tok.type === 'heading' && tok.depth === 2) {
      flushSection();
      curSection = tok.text;
    } else if (curSection) {
      curContent.push(tok);
    }
  }
  flushSection();
  return data;
}

function buildHTML(data) {
  const contactItems = data.contacts.map(c => {
    const icon = c[0];
    const val  = c.slice(1).trim();
    return `<div class="contact-item"><span class="ci-icon">${icon}</span><span>${val}</span></div>`;
  }).join('');

  let html = `
    <div class="resume-header">
      <div class="resume-eyebrow">Resume</div>
      <div class="resume-name">${data.name || 'Resume'}</div>
      ${data.title ? `<span class="resume-title-line">${data.title}</span>` : ''}
      ${contactItems ? `<div class="resume-contact">${contactItems}</div>` : ''}
    </div>
    <div class="tiles-grid">
  `;

  const WIDE_SECTIONS = new Set(['Summary','Experience','Profile']);
  const LIST_SECTIONS = new Set(['Skills','Core Competencies','Certifications','Languages','Awards & Honours','Volunteer','Publications']);

  for (const sec of data.sections) {
    const wide = WIDE_SECTIONS.has(sec.title);
    html += `<div class="tile${wide?' wide':''}"><div class="tile-label">${sec.title}</div>`;

    if (sec.title === 'Summary' || sec.title === 'Profile') {
      const text = sec.content.map(t => t.raw || '').join(' ').replace(/\n+/g,' ').trim();
      html += `<div class="summary-text">${text}</div>`;

    } else if (sec.title === 'Experience') {
      html += buildExpSection(sec.content);

    } else if (sec.title === 'Education') {
      html += buildEduSection(sec.content);

    } else if (LIST_SECTIONS.has(sec.title)) {
      const items = [];
      for (const tok of sec.content) {
        if (tok.type === 'list') tok.items.forEach(item => items.push(item.text));
        if (tok.type === 'paragraph') tok.text.split(/\n|,/).map(s=>s.trim()).filter(Boolean).forEach(s=>items.push(s));
      }
      if (sec.title === 'Languages') {
        html += `<div class="pill-row">${items.map(i=>`<span class="pill">${i}</span>`).join('')}</div>`;
      } else {
        html += `<ul class="bullet-list">${items.map(i=>`<li><span class="bullet-dot"></span><span>${i}</span></li>`).join('')}</ul>`;
      }

    } else if (sec.title === 'Projects') {
      html += buildProjectsSection(sec.content);

    } else {
      // Generic: render whatever tokens we have
      const text = sec.content.map(t => {
        if (t.type === 'list') return '<ul class="bullet-list">' + t.items.map(i=>`<li><span class="bullet-dot"></span><span>${i.text}</span></li>`).join('') + '</ul>';
        return `<div class="summary-text">${t.raw||''}</div>`;
      }).join('');
      html += text;
    }

    html += '</div>';
  }

  html += '</div>';
  return html;
}

function buildExpSection(tokens) {
  let html = '';
  let curRole = null, curCompany = '', curDates = '', curDesc = [];

  function flush() {
    if (!curRole) return;
    html += `<div class="exp-entry">
      <div class="exp-role">${curRole}</div>
      ${curCompany ? `<div class="exp-company">${curCompany}</div>` : ''}
      ${curDates   ? `<div class="exp-dates">${curDates}</div>` : ''}
      ${curDesc.length ? `<div class="exp-desc">${curDesc.join(' ')}</div>` : ''}
    </div>`;
    curRole=''; curCompany=''; curDates=''; curDesc=[];
  }

  for (const tok of tokens) {
    if (tok.type === 'heading' && tok.depth === 3) {
      flush(); curRole = tok.text;
    } else if (tok.type === 'paragraph' && curRole) {
      const lines = tok.raw.split('\n').map(l=>l.trim()).filter(Boolean);
      for (const line of lines) {
        const stripped = line.replace(/\*\*/g,'').replace(/\*/g,'').trim();
        // Bold = company
        if (/^\*\*(.+)\*\*$/.test(line.trim()))    { curCompany = stripped; }
        // Italic = dates
        else if (/^\*(.+)\*$/.test(line.trim()))   { curDates   = stripped; }
        else { curDesc.push(stripped); }
      }
    }
  }
  flush();
  return html;
}

function buildEduSection(tokens) {
  let html = '';
  let curDeg = null, curSchool = '', curYear = '';

  function flush() {
    if (!curDeg) return;
    html += `<div class="edu-entry">
      <div class="edu-degree">${curDeg}</div>
      ${curSchool ? `<div class="edu-school">${curSchool}</div>` : ''}
      ${curYear   ? `<div class="edu-year">${curYear}</div>` : ''}
    </div>`;
    curDeg=''; curSchool=''; curYear='';
  }

  for (const tok of tokens) {
    if (tok.type === 'heading' && tok.depth === 3) {
      flush(); curDeg = tok.text;
    } else if (tok.type === 'paragraph' && curDeg) {
      const lines = tok.raw.split('\n').map(l=>l.trim()).filter(Boolean);
      for (const line of lines) {
        const stripped = line.replace(/\*\*/g,'').replace(/\*/g,'').trim();
        if (/^\*\*(.+)\*\*$/.test(line.trim()))  curSchool = stripped;
        else if (/^\*(.+)\*$/.test(line.trim()))  curYear   = stripped;
      }
    }
  }
  flush();
  return html;
}

function buildProjectsSection(tokens) {
  let html = '';
  let curName = null, curDesc = '';

  function flush() {
    if (!curName) return;
    html += `<div style="margin-bottom:.8rem;padding-bottom:.8rem;border-bottom:1px solid rgba(255,255,255,.05)">
      <div style="font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--text-bright);margin-bottom:.2rem">${curName}</div>
      ${curDesc ? `<div style="font-size:.79rem;color:var(--text);line-height:1.6">${curDesc}</div>` : ''}
    </div>`;
    curName=''; curDesc='';
  }

  for (const tok of tokens) {
    if (tok.type === 'heading' && tok.depth === 3) { flush(); curName = tok.text; }
    else if (tok.type === 'paragraph' && curName)  { curDesc = tok.text; }
  }
  flush();
  return html;
}

// ═════════════════════════════════════════════════════
// DOWNLOADS
// ═════════════════════════════════════════════════════
function downloadPDF() {
  if (!originalPDFBytes) return;
  const blob = new Blob([originalPDFBytes], { type: 'application/pdf' });
  triggerDownload(blob, originalFileName + '.pdf');
}

function downloadMD() {
  const blob = new Blob([mdEditor.value], { type: 'text/markdown' });
  triggerDownload(blob, originalFileName + '.md');
}

function downloadHTML() {
  const previewHTML = previewPane.innerHTML;
  const styles = document.querySelector('style').outerHTML;
  const doc = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>${originalFileName}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
${styles}
</head>
<body style="max-width:860px;margin:0 auto;padding:3rem 1.5rem 6rem">
${previewHTML}
<script>
// Auto-reveal tiles
document.querySelectorAll('.tile').forEach((t,i)=>{
  t.style.animationDelay=(0.04+i*0.06)+'s';
  requestAnimationFrame(()=>t.classList.add('revealed'));
});
<\/script>
</body>
</html>`;
  const blob = new Blob([doc], { type: 'text/html' });
  triggerDownload(blob, originalFileName + '.html');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Utils ─────────────────────────────────────────────
function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.toggle('visible', !!msg);
}

function resetAll() {
  editorScreen.classList.remove('visible');
  uploadScreen.style.display = '';
  mdEditor.value = '';
  previewPane.innerHTML = '';
  originalPDFBytes = null;
  fileInput.value = '';
}
</script>
</body>
</html>
