<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #111827;
    --card: #1e2d3d;
    --card-hover: #243448;
    --border: #2a3f55;
    --gold: #c9a84c;
    --gold-dim: #8a6f33;
    --gold-glow: rgba(201,168,76,0.12);
    --text: #c8d8e8;
    --text-dim: #6b8099;
    --text-bright: #e8f0f8;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* ── UPLOAD ─────────────────────────────────────────── */
  #upload-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    position: relative; overflow: hidden;
  }
  #upload-screen::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(74,158,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .upload-eyebrow { font-family: var(--mono); font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; opacity: 0; animation: fadeUp .6s .1s forwards; }
  .upload-title   { font-family: var(--serif); font-size: clamp(2.8rem,6vw,5rem); font-weight: 300; color: var(--text-bright); text-align: center; line-height: 1.1; margin-bottom: .5rem; opacity: 0; animation: fadeUp .6s .2s forwards; }
  .upload-title em { font-style: italic; color: var(--gold); }
  .upload-sub  { font-size: .85rem; color: var(--text-dim); text-align: center; margin-bottom: 3rem; opacity: 0; animation: fadeUp .6s .3s forwards; }
  .drop-zone {
    width: 100%; max-width: 520px; border: 1px solid var(--border); border-radius: 6px;
    padding: 3rem 2rem; text-align: center; cursor: pointer; background: var(--card);
    transition: all .25s; opacity: 0; animation: fadeUp .6s .4s forwards;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold-dim); background: var(--card-hover); box-shadow: 0 0 40px var(--gold-glow); }
  .drop-zone input[type="file"] { display: none; }
  .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
  .drop-zone h3 { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--text-bright); margin-bottom: .4rem; }
  .drop-zone p  { font-family: var(--mono); font-size: .68rem; color: var(--text-dim); letter-spacing: .06em; }
  .upload-note { margin-top: 1.5rem; font-family: var(--mono); font-size: .65rem; color: var(--text-dim); letter-spacing: .08em; opacity: 0; animation: fadeUp .6s .5s forwards; }
  .upload-note span { color: var(--gold); }
  #error-box { display: none; background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.25); border-radius: 4px; padding: 1rem 1.5rem; margin-top: 1rem; font-family: var(--mono); font-size: .75rem; color: #ff8080; max-width: 520px; width: 100%; }
  #error-box.visible { display: block; }

  /* ── LOADING ────────────────────────────────────────── */
  #loading-screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  #loading-screen.visible { display: flex; }
  .loading-glyph { font-family: var(--serif); font-size: 4rem; color: var(--gold); animation: breathe 2s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:.4;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
  .loading-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-dim); }
  .loading-progress { width: 200px; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .loading-bar { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); animation: loadBar 2s ease-in-out infinite; transform-origin: left; }
  @keyframes loadBar { 0%{transform:scaleX(0)} 50%{transform:scaleX(.8)} 100%{transform:scaleX(0) translateX(200%)} }

  /* ── EDITOR SCREEN ──────────────────────────────────── */
  #editor-screen { display: none; min-height: 100vh; flex-direction: column; }
  #editor-screen.visible { display: flex; }

  .editor-topbar {
    position: sticky; top: 0; z-index: 100;
    background: #0d1520; border-bottom: 1px solid var(--border);
    padding: .9rem 1.5rem;
    display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
  }
  .topbar-brand { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--gold); margin-right: auto; white-space: nowrap; }
  .tb-btn {
    display: flex; align-items: center; gap: .4rem;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--mono);
    font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
    padding: .45rem .9rem; cursor: pointer; border-radius: 3px; transition: all .2s;
    white-space: nowrap;
  }
  .tb-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .tb-btn.primary { border-color: var(--gold-dim); color: var(--gold); background: rgba(201,168,76,.07); }
  .tb-btn.primary:hover { background: rgba(201,168,76,.14); }
  .tb-btn .btn-icon { font-size: .75rem; }
  .tb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  /* Editor body */
  .editor-body { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
  @media (max-width: 700px) { .editor-body { grid-template-columns: 1fr; } }

  .pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); min-height: 0; overflow: hidden; }
  .pane:last-child { border-right: none; }
  .pane-header {
    padding: .55rem 1.2rem; background: #0d1520; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .5rem;
    font-family: var(--mono); font-size: .58rem; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text-dim); flex-shrink: 0;
  }
  .pane-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pane-dot.gold { background: var(--gold); }
  .pane-dot.teal { background: #2dd4bf; }

  #md-editor {
    flex: 1; resize: none; border: none; outline: none;
    background: #0d1825; color: var(--text);
    font-family: var(--mono); font-size: .78rem; line-height: 1.7;
    padding: 1.5rem; tab-size: 2; min-height: 0; overflow-y: auto;
  }

  #preview-pane {
    flex: 1; overflow-y: auto;
    padding: 2rem 2.5rem 4rem;
    background: var(--bg);
  }

  /* ── PREVIEW STYLES ─────────────────────────────────── */
  .doc-title {
    font-family: var(--serif); font-size: clamp(2rem,4vw,3rem); font-weight: 300;
    color: var(--text-bright); line-height: 1.1; margin-bottom: 1.5rem;
    padding-bottom: 1.2rem; border-bottom: 1px solid var(--border);
    position: relative; display: inline-block;
  }
  .doc-title::after {
    content: ''; position: absolute; left: 0; bottom: -1px;
    width: 60px; height: 2px; background: var(--gold);
  }

  .tiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1rem; }

  .tile { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1.4rem 1.6rem; position: relative; overflow: hidden; transition: border-color .2s, background .2s; opacity: 0; transform: translateY(12px); }
  .tile.wide { grid-column: 1 / -1; }
  .tile.revealed { animation: tileIn .4s ease forwards; }
  @keyframes tileIn { to { opacity: 1; transform: translateY(0); } }
  .tile:hover { border-color: var(--gold-dim); background: var(--card-hover); }
  .tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent,var(--gold-dim),transparent); opacity: 0; transition: opacity .2s; }
  .tile:hover::before { opacity: 1; }
  .tile-label { font-family: var(--mono); font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: .9rem; }

  /* Content styles inside tiles */
  .body-text { font-size: .87rem; line-height: 1.75; color: var(--text); }
  .body-text p { margin-bottom: .7rem; }
  .body-text p:last-child { margin-bottom: 0; }

  .sub-heading { font-family: var(--serif); font-size: 1rem; font-weight: 600; color: var(--text-bright); margin: .8rem 0 .3rem; }
  .sub-heading:first-child { margin-top: 0; }

  .bullet-list { list-style: none; }
  .bullet-list li { display: flex; align-items: flex-start; gap: .5rem; padding: .3rem 0; font-size: .84rem; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); }
  .bullet-list li:last-child { border-bottom: none; }
  .bullet-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: .42em; }

  .numbered-list { list-style: none; counter-reset: doc-counter; }
  .numbered-list li { display: flex; align-items: flex-start; gap: .6rem; padding: .3rem 0; font-size: .84rem; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); counter-increment: doc-counter; }
  .numbered-list li:last-child { border-bottom: none; }
  .numbered-list li::before { content: counter(doc-counter); font-family: var(--mono); font-size: .65rem; color: var(--gold); min-width: 1.2rem; margin-top: .15em; }

  .pill-row { display: flex; flex-wrap: wrap; gap: .35rem; }
  .pill { background: rgba(201,168,76,.08); border: 1px solid rgba(201,168,76,.2); color: var(--text); font-family: var(--mono); font-size: .63rem; padding: .18rem .55rem; border-radius: 20px; }

  .kv-table { width: 100%; border-collapse: collapse; }
  .kv-table tr { border-bottom: 1px solid rgba(255,255,255,.05); }
  .kv-table tr:last-child { border-bottom: none; }
  .kv-table td { padding: .4rem .3rem; font-size: .83rem; }
  .kv-table td:first-child { color: var(--text-dim); font-family: var(--mono); font-size: .7rem; width: 38%; padding-right: 1rem; }
  .kv-table td:last-child { color: var(--text-bright); }

  blockquote.doc-quote {
    border-left: 2px solid var(--gold-dim); padding-left: 1rem; margin: .5rem 0;
    font-family: var(--serif); font-style: italic; font-size: .95rem; color: var(--text-dim);
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @media (max-width: 560px) { .tiles-grid { grid-template-columns: 1fr; } .tile.wide { grid-column: auto; } }
</style>
</head>
<body>

<!-- ── UPLOAD ── -->
<div id="upload-screen">
  <p class="upload-eyebrow">PDF · Parser</p>
  <h1 class="upload-title">Convert your <em>PDF.</em></h1>
  <p class="upload-sub">PDF → Markdown → Tiled HTML · 100% in your browser</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf"/>
    <span class="drop-icon">📄</span>
    <h3>Drop PDF here</h3>
    <p>or click to browse · .pdf files only</p>
  </div>
  <div id="error-box"></div>
  <p class="upload-note"><span>Client-side only</span> · PDF.js + marked.js · no data leaves your device</p>
</div>

<!-- ── LOADING ── -->
<div id="loading-screen">
  <div class="loading-glyph">✦</div>
  <p class="loading-label" id="loading-label">Reading PDF...</p>
  <div class="loading-progress"><div class="loading-bar"></div></div>
</div>

<!-- ── EDITOR + PREVIEW ── -->
<div id="editor-screen">

  <div class="editor-topbar">
    <span class="topbar-brand">pdf · parser</span>

    <button class="tb-btn" onclick="downloadPDF()">
      <span class="btn-icon">⬇</span> Download PDF
    </button>
    <button class="tb-btn" onclick="downloadMD()">
      <span class="btn-icon">⬇</span> Download MD
    </button>
    <button class="tb-btn primary" onclick="downloadHTML()">
      <span class="btn-icon">⬇</span> Download HTML
    </button>

    <div class="tb-divider"></div>
    <button class="tb-btn" onclick="resetAll()">↩ New PDF</button>
  </div>

  <div class="editor-body">
    <div class="pane">
      <div class="pane-header"><span class="pane-dot gold"></span>Markdown — edit freely</div>
      <textarea id="md-editor" spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header"><span class="pane-dot teal"></span>Preview — live render</div>
      <div id="preview-pane"></div>
    </div>
  </div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ─────────────────────────────────────────────
let originalPDFBytes = null;
let originalFileName = 'document';

// ── DOM ───────────────────────────────────────────────
const uploadScreen  = document.getElementById('upload-screen');
const loadingScreen = document.getElementById('loading-screen');
const editorScreen  = document.getElementById('editor-screen');
const mdEditor      = document.getElementById('md-editor');
const previewPane   = document.getElementById('preview-pane');
const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const errorBox      = document.getElementById('error-box');
const loadingLabel  = document.getElementById('loading-label');

// ── Drop zone ─────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) go(e.target.files[0]); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) go(e.dataTransfer.files[0]);
});

// Live re-render on edit
mdEditor.addEventListener('input', () => renderPreview(mdEditor.value));

// ── Main flow ─────────────────────────────────────────
async function go(file) {
  showError('');
  originalFileName = file.name.replace(/\.pdf$/i, '');
  uploadScreen.style.display = 'none';
  loadingScreen.classList.add('visible');

  try {
    setLoading('Extracting text from PDF...');
    const buf = await file.arrayBuffer();
    originalPDFBytes = buf.slice(0);

    const { lines, meta } = await extractText(buf);

    setLoading('Converting to Markdown...');
    await sleep(150);
    const md = pdfToMarkdown(lines, meta);

    setLoading('Rendering preview...');
    await sleep(150);

    mdEditor.value = md;
    loadingScreen.classList.remove('visible');
    editorScreen.classList.add('visible');
    renderPreview(md);

  } catch(err) {
    loadingScreen.classList.remove('visible');
    uploadScreen.style.display = '';
    showError('Error: ' + err.message);
  }
}

function setLoading(msg) { loadingLabel.textContent = msg; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═════════════════════════════════════════════════════
// STEP 1 — PDF → annotated lines
// ═════════════════════════════════════════════════════
async function extractText(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const allLines  = [];
  const fontSizes = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Group items into visual lines by y-position
    const byY = {};
    for (const item of content.items) {
      if (!item.str.trim()) continue;
      const y = Math.round(item.transform[5]);
      if (!byY[y]) byY[y] = [];
      byY[y].push(item);
    }

    const ys = Object.keys(byY).map(Number).sort((a, b) => b - a);
    let prevY = null;
    for (const y of ys) {
      const items  = byY[y].sort((a, b) => a.transform[4] - b.transform[4]);
      const text   = items.map(i => i.str).join(' ').replace(/\s+/g, ' ').trim();
      // Use transform[3] — the correct font size field
      const size   = Math.max(...items.map(i => Math.abs(i.transform[3]) || 10));
      const bold   = items.some(i => i.fontName && /bold|heavy|black/i.test(i.fontName));
      const x      = items[0].transform[4];
      const yGap   = prevY !== null ? prevY - y : 999;

      if (text) {
        allLines.push({ text, size, bold, x, y, yGap, page: p });
        fontSizes.push(size);
      }
      prevY = y;
    }
  }

  // Document-relative thresholds — no hardcoded values
  const sorted = [...fontSizes].sort((a, b) => a - b);
  const n      = sorted.length;
  const median = sorted[Math.floor(n * 0.50)] || 10;
  const p75    = sorted[Math.floor(n * 0.75)] || 12;
  const p90    = sorted[Math.floor(n * 0.90)] || 14;

  return { lines: allLines, meta: { median, p75, p90 } };
}

// ═════════════════════════════════════════════════════
// STEP 2 — annotated lines → Markdown
// Generic: heading level from font size relative to
// document median. Paragraphs grouped by proximity.
// ═════════════════════════════════════════════════════
function pdfToMarkdown(lines, meta) {
  const { median, p75, p90 } = meta;
  const md = [];

  // Classify each line
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const t    = line.text.trim();
    if (!t) continue;

    const isBullet  = /^[•●▪▸►\-–]\s+\S/.test(t);
    const isOrdered = /^\d+[.)]\s+\S/.test(t);
    const isAllCaps = t.length > 2 && t.length < 80 && t === t.toUpperCase() && /[A-Z]{2}/.test(t);

    // Heading detection: relative to this document's font distribution
    if (line.size >= p90 * 0.95 && t.length < 120) {
      md.push(`# ${t}\n`);
    } else if ((line.size >= p75 * 0.95 || (isAllCaps && line.size >= median * 1.05)) && t.length < 120) {
      md.push(`## ${t}\n`);
    } else if (line.size >= median * 1.12 && (line.bold || isAllCaps) && t.length < 100) {
      md.push(`### ${t}\n`);
    } else if (line.bold && line.size >= median * 0.95 && t.length < 100) {
      md.push(`#### ${t}\n`);
    } else if (isBullet) {
      md.push(`- ${t.replace(/^[•●▪▸►\-–]\s+/, '')}`);
    } else if (isOrdered) {
      md.push(`1. ${t.replace(/^\d+[.)]\s+/, '')}`);
    } else {
      // Body text — try to join with previous line if it was also body
      // and the y-gap is small (same paragraph)
      const prevMd = md[md.length - 1] || '';
      const isSmallGap = line.yGap < median * 2.5 && line.yGap > 0;
      const prevIsBody = prevMd && !prevMd.startsWith('#') && !prevMd.startsWith('-') && !prevMd.startsWith('1.') && !prevMd.endsWith('\n') && prevMd.trim().length > 0;
      const sameIndent = i > 0 && Math.abs(line.x - lines[i-1].x) < 15;

      if (prevIsBody && isSmallGap && sameIndent) {
        // Append to previous paragraph
        md[md.length - 1] = prevMd + ' ' + t;
      } else {
        if (prevMd && !prevMd.endsWith('\n')) md.push('');
        md.push(t);
      }
    }
  }

  return md.join('\n').replace(/\n{3,}/g, '\n\n').trim();
}

// ═════════════════════════════════════════════════════
// STEP 3 — Markdown → tiled HTML (live preview)
// Walks marked.js tokens and builds tiles from sections
// ═════════════════════════════════════════════════════
function renderPreview(md) {
  const tokens = marked.lexer(md);
  previewPane.innerHTML = buildHTML(tokens);

  const tiles = previewPane.querySelectorAll('.tile');
  tiles.forEach((t, i) => {
    t.style.animationDelay = (0.04 + i * 0.06) + 's';
    requestAnimationFrame(() => t.classList.add('revealed'));
  });
}

function buildHTML(tokens) {
  // Find the document title (first h1)
  let docTitle = '';
  const rest   = [];
  for (const tok of tokens) {
    if (!docTitle && tok.type === 'heading' && tok.depth === 1) {
      docTitle = tok.text;
    } else {
      rest.push(tok);
    }
  }

  // Split remaining tokens into sections at every h2
  const sections = [];
  let curTitle   = null;
  let curTokens  = [];

  function flushSection() {
    if (curTitle !== null || curTokens.length) {
      sections.push({ title: curTitle, tokens: [...curTokens] });
    }
    curTitle  = null;
    curTokens = [];
  }

  for (const tok of rest) {
    if (tok.type === 'heading' && tok.depth === 2) {
      flushSection();
      curTitle = tok.text;
    } else {
      curTokens.push(tok);
    }
  }
  flushSection();

  // Build HTML
  let html = '';

  if (docTitle) {
    html += `<div class="doc-title">${docTitle}</div>`;
  }

  html += `<div class="tiles-grid">`;

  for (const sec of sections) {
    // Decide tile width: wide if section has lots of prose content
    const hasLargeProse = sec.tokens.some(t => t.type === 'paragraph' && t.text && t.text.length > 200);
    const hasSubHeadings = sec.tokens.some(t => t.type === 'heading');
    const wide = hasLargeProse || hasSubHeadings || !sec.title;

    html += `<div class="tile${wide ? ' wide' : ''}">`;
    if (sec.title) html += `<div class="tile-label">${sec.title}</div>`;
    html += renderSectionTokens(sec.tokens);
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderSectionTokens(tokens) {
  let html = '';

  for (const tok of tokens) {
    switch (tok.type) {

      case 'heading':
        html += `<div class="sub-heading">${tok.text}</div>`;
        break;

      case 'paragraph':
        html += `<div class="body-text"><p>${tok.text}</p></div>`;
        break;

      case 'list': {
        const ordered = tok.ordered;
        const cls     = ordered ? 'numbered-list' : 'bullet-list';
        html += `<${ordered ? 'ol' : 'ul'} class="${cls}">`;
        for (const item of tok.items) {
          if (ordered) {
            html += `<li>${item.text}</li>`;
          } else {
            html += `<li><span class="bullet-dot"></span><span>${item.text}</span></li>`;
          }
        }
        html += `</${ordered ? 'ol' : 'ul'}>`;
        break;
      }

      case 'blockquote': {
        const inner = tok.tokens?.map(t => t.text || '').join(' ') || tok.text || '';
        html += `<blockquote class="doc-quote">${inner}</blockquote>`;
        break;
      }

      case 'table': {
        // Render as key-value table if 2 columns, otherwise standard table
        const isTwoCol = tok.header?.length === 2;
        if (isTwoCol) {
          html += `<table class="kv-table">`;
          for (const row of tok.rows) {
            html += `<tr><td>${row[0]?.text || ''}</td><td>${row[1]?.text || ''}</td></tr>`;
          }
          html += `</table>`;
        } else {
          html += `<div class="body-text">`;
          html += `<table style="width:100%;border-collapse:collapse;font-size:.82rem">`;
          html += `<thead><tr>${tok.header.map(h => `<th style="text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--border);color:var(--gold-dim);font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase">${h.text}</th>`).join('')}</tr></thead>`;
          html += `<tbody>${tok.rows.map(row => `<tr>${row.map(cell => `<td style="padding:.35rem .5rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text)">${cell.text}</td>`).join('')}</tr>`).join('')}</tbody>`;
          html += `</table></div>`;
        }
        break;
      }

      case 'code':
        html += `<div style="background:#0d1825;border-radius:4px;padding:1rem;overflow-x:auto;margin:.5rem 0"><pre style="font-family:var(--mono);font-size:.75rem;color:var(--text);line-height:1.6;margin:0">${tok.text}</pre></div>`;
        break;

      case 'hr':
        html += `<hr style="border:none;border-top:1px solid var(--border);margin:.8rem 0"/>`;
        break;

      default:
        if (tok.raw?.trim()) {
          html += `<div class="body-text"><p>${tok.raw.trim()}</p></div>`;
        }
    }
  }

  return html;
}

// ═════════════════════════════════════════════════════
// DOWNLOADS
// ═════════════════════════════════════════════════════
function downloadPDF() {
  if (!originalPDFBytes) return;
  triggerDownload(new Blob([originalPDFBytes], { type: 'application/pdf' }), originalFileName + '.pdf');
}

function downloadMD() {
  triggerDownload(new Blob([mdEditor.value], { type: 'text/markdown' }), originalFileName + '.md');
}

function downloadHTML() {
  const styles = document.querySelector('style').outerHTML;
  const doc = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>${originalFileName}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
${styles}
</head>
<body style="max-width:960px;margin:0 auto;padding:3rem 1.5rem 6rem">
${previewPane.innerHTML}
<script>
document.querySelectorAll('.tile').forEach((t,i)=>{
  t.style.animationDelay=(0.04+i*0.06)+'s';
  requestAnimationFrame(()=>t.classList.add('revealed'));
});
<\/script>
</body>
</html>`;
  triggerDownload(new Blob([doc], { type: 'text/html' }), originalFileName + '.html');
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Utils ─────────────────────────────────────────────
function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.toggle('visible', !!msg);
}

function resetAll() {
  editorScreen.classList.remove('visible');
  uploadScreen.style.display = '';
  mdEditor.value = '';
  previewPane.innerHTML = '';
  originalPDFBytes = null;
  fileInput.value = '';
}
</script>
</body>
</html>
