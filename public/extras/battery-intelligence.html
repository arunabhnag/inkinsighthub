<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battery Intelligence Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #111820;
    --border: #1e3a4a;
    --accent: #00e5ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --warn: #ffcc00;
    --danger: #ff3860;
    --text: #c9d8e8;
    --text-dim: #4a6a80;
    --text-bright: #e8f4ff;
    --font-mono: 'Share Tech Mono', monospace;
    --font-main: 'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,229,255,0.012) 2px,
      rgba(0,229,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  .logo {
    width: 52px;
    height: 52px;
    position: relative;
    flex-shrink: 0;
  }

  .logo svg { width: 100%; height: 100%; }

  .header-text h1 {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .header-text p {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  .drop-zone-wrapper {
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 100px);
  }

  .drop-zone {
    width: 100%;
    max-width: 640px;
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    background: var(--surface);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,255,0.03);
    box-shadow: 0 0 30px rgba(0,229,255,0.08), inset 0 0 30px rgba(0,229,255,0.03);
  }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 10px rgba(0,229,255,0.4));
  }

  .drop-zone h2 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-bright);
    margin-bottom: 0.5rem;
  }

  .drop-zone p {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .drop-zone input { display: none; }

  .drop-hint {
    margin-top: 2rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .drop-hint span {
    color: var(--accent);
    font-size: 0.85em;
  }

  /* ANALYSIS VIEW */
  .analysis { display: none; padding: 1.5rem 2rem 4rem; }
  .analysis.visible { display: block; }

  .analysis-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 1rem;
  }

  .device-title {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-bright);
  }

  .report-time {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-top: 0.25rem;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .reset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* VERDICT BANNER */
  .verdict-banner {
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .verdict-banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .verdict-banner.excellent { background: rgba(0,255,157,0.06); border: 1px solid rgba(0,255,157,0.2); }
  .verdict-banner.excellent::before { background: var(--accent2); box-shadow: 0 0 12px var(--accent2); }
  .verdict-banner.good { background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.2); }
  .verdict-banner.good::before { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .verdict-banner.warning { background: rgba(255,204,0,0.06); border: 1px solid rgba(255,204,0,0.2); }
  .verdict-banner.warning::before { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
  .verdict-banner.critical { background: rgba(255,56,96,0.06); border: 1px solid rgba(255,56,96,0.2); }
  .verdict-banner.critical::before { background: var(--danger); box-shadow: 0 0 12px var(--danger); }

  .verdict-icon { font-size: 2.5rem; flex-shrink: 0; }

  .verdict-text .verdict-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.25rem;
  }

  .verdict-text .verdict-title {
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }

  .verdict-text .verdict-desc {
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
    max-width: 600px;
  }

  /* METRICS GRID */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .metric-card:hover { border-color: rgba(0,229,255,0.3); }

  .metric-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .metric-card:hover::after { opacity: 1; }

  .metric-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }

  .metric-value {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-bright);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .metric-value.accent { color: var(--accent); }
  .metric-value.good { color: var(--accent2); }
  .metric-value.warn { color: var(--warn); }
  .metric-value.danger { color: var(--danger); }

  .metric-sub {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* HEALTH BAR */
  .health-bar-container {
    margin-bottom: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
  }

  .health-bar-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .health-bar-label span:first-child {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .health-bar-label span:last-child {
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text-bright);
  }

  .health-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: visible;
    position: relative;
  }

  .health-bar-fill {
    height: 100%;
    border-radius: 4px;
    position: relative;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0;
  }

  .health-bar-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: inherit;
    box-shadow: 0 0 10px currentColor;
    transform: translateX(50%);
  }

  .health-bar-milestones {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
  }

  .milestone {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* SECTIONS */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .section-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface2);
  }

  .section-icon { font-size: 1rem; }

  .section-title {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .section-body { padding: 1.5rem; }

  /* DATA TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

  .data-table td, .data-table th {
    padding: 0.5rem 0.75rem;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .data-table th {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: rgba(0,0,0,0.2);
  }

  .data-table td.key {
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    width: 40%;
  }

  .data-table td.val {
    color: var(--text-bright);
    font-weight: 600;
  }

  .data-table tr:last-child td { border-bottom: none; }

  /* INTELLIGENCE ANALYSIS */
  .intel-list { list-style: none; }

  .intel-item {
    display: flex;
    gap: 1rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: flex-start;
  }

  .intel-item:last-child { border-bottom: none; }

  .intel-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 0.4rem;
    flex-shrink: 0;
  }

  .intel-bullet.positive { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .intel-bullet.neutral { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .intel-bullet.warning { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .intel-bullet.danger { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .intel-content { flex: 1; }
  .intel-title { font-weight: 700; font-size: 0.85rem; color: var(--text-bright); margin-bottom: 0.2rem; }
  .intel-desc { font-size: 0.78rem; color: var(--text); line-height: 1.5; }

  /* HISTORY CHART */
  .chart-area {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  canvas { max-width: 100%; display: block; }

  /* USAGE RECENT TABLE */
  .usage-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .usage-table th {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0.4rem 0.6rem;
    background: rgba(0,0,0,0.3);
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .usage-table td {
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    color: var(--text);
  }
  .usage-table tr:last-child td { border-bottom: none; }
  .usage-table tr:hover td { background: rgba(0,229,255,0.03); }

  .state-badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .state-badge.active { background: rgba(0,255,157,0.12); color: var(--accent2); }
  .state-badge.standby { background: rgba(0,229,255,0.08); color: var(--accent); }

  .source-badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
  }
  .source-badge.ac { background: rgba(255,107,53,0.15); color: var(--accent3); }
  .source-badge.dc { background: rgba(255,204,0,0.1); color: var(--warn); }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 4rem;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* AI badge */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    margin-left: auto;
  }

  .ai-badge::before {
    content: '◆';
    font-size: 0.5rem;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

  .error-msg {
    background: rgba(255,56,96,0.08);
    border: 1px solid rgba(255,56,96,0.25);
    border-radius: 4px;
    padding: 1.5rem;
    color: var(--danger);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    margin: 1rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  .scroll-hint {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: right;
    padding-top: 0.5rem;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="20" width="6" height="12" rx="1" fill="#00e5ff" opacity="0.6"/>
      <rect x="12" y="14" width="28" height="24" rx="2" fill="none" stroke="#00e5ff" stroke-width="2"/>
      <rect x="40" y="23" width="4" height="6" rx="1" fill="#00e5ff" opacity="0.4"/>
      <rect x="16" y="18" width="8" height="16" rx="1" fill="#00ff9d" opacity="0.7"/>
      <rect x="26" y="18" width="8" height="16" rx="1" fill="#00e5ff" opacity="0.5"/>
      <line x1="16" y1="26" x2="34" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Battery Intelligence</h1>
    <p>powercfg /batteryhealth · Diagnostic Report Analyzer</p>
  </div>
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="drop-zone-wrapper" id="dropWrapper">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".html,.htm"/>
    <div class="drop-icon">⚡</div>
    <h2>Drop Battery Report</h2>
    <p>Drag & drop your powercfg /batteryreport HTML file here</p>
  </div>
  <p class="drop-hint">or <span>click to browse</span> · accepts <span>.html</span> files from powercfg /batteryreport</p>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Parsing report data...</p>
</div>

<div class="analysis" id="analysis"></div>

<script>
// ─── DOM ────────────────────────────────────────────────────────────
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const dropWrapper= document.getElementById('dropWrapper');
const loading    = document.getElementById('loading');
const analysis   = document.getElementById('analysis');
const errorMsg   = document.getElementById('errorMsg');

// ─── DROP ZONE ──────────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

// ─── PROCESS FILE ───────────────────────────────────────────────────
function processFile(file) {
  showError('');
  const reader = new FileReader();
  reader.onload = e => {
    dropWrapper.style.display = 'none';
    loading.classList.add('visible');
    setTimeout(() => {
      try {
        const data = parseReport(e.target.result);
        loading.classList.remove('visible');
        renderAnalysis(data);
      } catch(err) {
        loading.classList.remove('visible');
        dropWrapper.style.display = '';
        showError('Could not parse this file. Make sure it is a valid powercfg /batteryreport HTML file. Error: ' + err.message);
      }
    }, 600);
  };
  reader.readAsText(file);
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.toggle('visible', !!msg);
}

// ─── PARSE ──────────────────────────────────────────────────────────
function parseReport(html) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');
  const text   = doc.body ? doc.body.innerText : html;

  function extractLabel(label) {
    // Try table cells
    const cells = doc.querySelectorAll('td');
    for (let i = 0; i < cells.length; i++) {
      if (cells[i].textContent.trim().toUpperCase() === label.toUpperCase()) {
        const next = cells[i].nextElementSibling || cells[i+1];
        if (next) return next.textContent.trim();
      }
    }
    // Span labels
    const spans = doc.querySelectorAll('span.label');
    for (const span of spans) {
      if (span.textContent.trim().toUpperCase() === label.toUpperCase()) {
        const td = span.closest('td');
        if (td && td.nextElementSibling) return td.nextElementSibling.textContent.trim();
      }
    }
    return null;
  }

  // System info
  const computerName  = extractLabel('COMPUTER NAME')       || 'Unknown';
  const productName   = extractLabel('SYSTEM PRODUCT NAME') || 'Unknown';
  const osBuild       = extractLabel('OS BUILD')            || 'Unknown';
  const platformRole  = extractLabel('PLATFORM ROLE')       || 'Unknown';
  const connStandby   = extractLabel('CONNECTED STANDBY')   || 'Unknown';
  const reportTime    = doc.querySelector('.dateTime span.date, .dateTime')?.textContent?.trim() || '';

  // Battery
  const batName       = extractLabel('NAME')            || 'Unknown';
  const manufacturer  = extractLabel('MANUFACTURER')    || 'Unknown';
  const serial        = extractLabel('SERIAL NUMBER')   || 'Unknown';
  const chemistry     = extractLabel('CHEMISTRY')       || 'Unknown';

  function parseMwh(str) {
    if (!str) return 0;
    return parseInt(str.replace(/[^0-9]/g, '')) || 0;
  }

  const designCap  = parseMwh(extractLabel('DESIGN CAPACITY'));
  const fullCharge = parseMwh(extractLabel('FULL CHARGE CAPACITY'));
  const cycleCount = parseInt(extractLabel('CYCLE COUNT')) || 0;

  const healthPct = designCap > 0 ? Math.round((fullCharge / designCap) * 100) : 0;
  const wearMwh   = designCap - fullCharge;

  // Battery life estimates — parse the table
  const estimates = [];
  const tables = doc.querySelectorAll('table');
  for (const table of tables) {
    const rows = table.querySelectorAll('tr');
    for (const row of rows) {
      const cells = row.querySelectorAll('td');
      if (cells.length >= 3) {
        const period = cells[0].textContent.trim();
        const activeFC = cells[1].textContent.trim();
        const standbyFC = cells[2].textContent.trim();
        if (period.match(/\d{4}-\d{2}/)) {
          const dc = cells.length >= 5 ? cells[4].textContent.trim() : '';
          estimates.push({ period, activeFC, standbyFC, activeDC: dc });
        }
      }
    }
  }

  // Recent usage rows
  const usageRows = [];
  const usageTables = doc.querySelectorAll('table');
  for (const table of usageTables) {
    const ths = table.querySelectorAll('th');
    const headers = Array.from(ths).map(t => t.textContent.trim().toUpperCase());
    if (headers.some(h => h.includes('STATE')) && headers.some(h => h.includes('CAPACITY'))) {
      const rows = table.querySelectorAll('tr');
      for (const row of rows) {
        const tds = row.querySelectorAll('td');
        if (tds.length >= 4) {
          const dt    = tds[0].textContent.trim();
          const state = tds[1].textContent.trim();
          const src   = tds[2].textContent.trim();
          const cap   = parseMwh(tds[3].textContent.trim());
          if (dt.match(/\d{4}/) && cap > 0) {
            usageRows.push({ dt, state, src, cap });
          }
        }
      }
      if (usageRows.length > 3) break;
    }
  }

  // Battery history — capacity vs design over time
  const historyRows = [];
  for (const table of tables) {
    const rows = table.querySelectorAll('tr');
    for (const row of rows) {
      const tds = row.querySelectorAll('td');
      if (tds.length >= 3) {
        const date = tds[0].textContent.trim();
        const fc = parseMwh(tds[1].textContent.trim());
        const dc = parseMwh(tds[2].textContent.trim());
        if (date.match(/^\d{4}-\d{2}-\d{2}$/) && fc > 0 && dc > 0) {
          historyRows.push({ date, fc, dc });
        }
      }
    }
  }

  return {
    computerName, productName, osBuild, platformRole, connStandby, reportTime,
    batName, manufacturer, serial, chemistry,
    designCap, fullCharge, cycleCount, healthPct, wearMwh,
    estimates, usageRows, historyRows
  };
}

// ─── INTELLIGENCE ENGINE ─────────────────────────────────────────────
function generateIntelligence(data) {
  const items = [];
  const { healthPct, cycleCount, designCap, fullCharge, wearMwh, estimates, historyRows } = data;

  // Health assessment
  if (healthPct >= 95) {
    items.push({ type: 'positive', title: 'Battery in Excellent Condition', desc: `Full charge capacity is ${healthPct}% of design capacity — essentially new. Minimal wear detected.` });
  } else if (healthPct >= 85) {
    items.push({ type: 'positive', title: 'Battery Health is Good', desc: `${healthPct}% capacity retained. Normal wear for the usage cycle count. No action needed.` });
  } else if (healthPct >= 70) {
    items.push({ type: 'warning', title: 'Moderate Battery Degradation', desc: `Capacity has dropped to ${healthPct}%. You've lost ${(wearMwh/1000).toFixed(1)} Wh from original design. Consider monitoring more closely.` });
  } else {
    items.push({ type: 'danger', title: 'Significant Battery Degradation', desc: `Capacity is only ${healthPct}% of original design. You have lost ${(wearMwh/1000).toFixed(1)} Wh. Battery replacement is advisable.` });
  }

  // Cycle count
  const typicalLifeCycles = 500;
  const cyclePct = Math.round((cycleCount / typicalLifeCycles) * 100);
  if (cycleCount < 100) {
    items.push({ type: 'positive', title: 'Low Cycle Count', desc: `Only ${cycleCount} cycles recorded. Battery has significant life remaining by typical lithium-ion standards (~500 full cycles rated).` });
  } else if (cycleCount < 300) {
    items.push({ type: 'neutral', title: 'Moderate Cycle Usage', desc: `${cycleCount} cycles used (~${cyclePct}% of typical rated life). Normal usage pattern. Expect continued good performance for 1–2+ years under typical use.` });
  } else if (cycleCount < 500) {
    items.push({ type: 'warning', title: 'High Cycle Count Approaching Limit', desc: `${cycleCount} cycles (~${cyclePct}% of rated life). Degradation will accelerate. Plan for replacement within 6–12 months.` });
  } else {
    items.push({ type: 'danger', title: 'Cycle Count Exceeded Typical Rating', desc: `${cycleCount} cycles exceeds typical Li-ion rated life of ~500. Replacement strongly recommended.` });
  }

  // Wear rate
  const wearRate = wearMwh / Math.max(cycleCount, 1);
  if (wearRate < 50) {
    items.push({ type: 'positive', title: 'Healthy Wear-Per-Cycle Rate', desc: `Approximately ${Math.round(wearRate)} mWh lost per cycle — well within normal bounds. Charging habits appear optimal.` });
  } else if (wearRate < 120) {
    items.push({ type: 'neutral', title: 'Average Wear-Per-Cycle Rate', desc: `${Math.round(wearRate)} mWh lost per cycle is within normal range, though above ideal. Avoid deep discharge cycles when possible.` });
  } else {
    items.push({ type: 'warning', title: 'Elevated Wear-Per-Cycle Rate', desc: `${Math.round(wearRate)} mWh lost per cycle is higher than optimal. Frequent deep discharges or heat exposure may be accelerating wear.` });
  }

  // Battery life estimates trend
  if (estimates.length >= 2) {
    const latest = estimates[estimates.length - 1];
    const earliest = estimates[0];
    const latestHrs = parseHms(latest.activeFC);
    const earliestHrs = parseHms(earliest.activeFC);
    if (latestHrs > 0 && earliestHrs > 0) {
      const trend = latestHrs - earliestHrs;
      if (trend > 0.5) {
        items.push({ type: 'positive', title: 'Active Battery Life Improving', desc: `Recent usage patterns show improved efficiency. Latest estimated active life: ${latest.activeFC}.` });
      } else if (trend < -1) {
        items.push({ type: 'warning', title: 'Active Battery Life Declining', desc: `Estimated active runtime has decreased compared to earlier periods (${earliest.activeFC} → ${latest.activeFC}). This may reflect both wear and usage pattern changes.` });
      } else {
        items.push({ type: 'neutral', title: 'Battery Life Relatively Stable', desc: `Active runtime estimates are consistent across periods. Latest: ${latest.activeFC} active, ${latest.standbyFC} in connected standby.` });
      }
    }
  }

  // Degradation projection
  if (cycleCount > 0 && wearMwh > 0) {
    const mwhPerCycle = wearMwh / cycleCount;
    const remainingCapacity = fullCharge - (fullCharge * 0.20); // To 80% of current
    const cyclesTo80 = Math.round(remainingCapacity / mwhPerCycle);
    items.push({ type: 'neutral', title: 'Degradation Projection', desc: `At current wear rate, the battery will reach 80% of its current capacity in approximately ${cyclesTo80} more cycles. This is an estimate based on observed historical patterns.` });
  }

  return items;
}

function parseHms(str) {
  if (!str) return 0;
  const m = str.match(/(\d+):(\d+):(\d+)/);
  if (!m) return 0;
  return parseInt(m[1]) + parseInt(m[2]) / 60 + parseInt(m[3]) / 3600;
}

// ─── VERDICT ────────────────────────────────────────────────────────
function getVerdict(healthPct, cycleCount) {
  if (healthPct >= 90 && cycleCount < 200) return { cls: 'excellent', icon: '🟢', title: 'Excellent — Battery is Healthy', desc: `Your battery retains ${healthPct}% of its design capacity with only ${cycleCount} cycles. It is performing like a nearly-new unit. No action required.` };
  if (healthPct >= 80 && cycleCount < 350) return { cls: 'good', icon: '🔵', title: 'Good — Normal Aging', desc: `${healthPct}% capacity remaining at ${cycleCount} cycles is normal and expected. Battery is performing within healthy parameters for its age.` };
  if (healthPct >= 70 || cycleCount < 500) return { cls: 'warning', icon: '🟡', title: 'Fair — Moderate Wear Detected', desc: `At ${healthPct}% capacity and ${cycleCount} cycles, the battery is showing meaningful wear. Consider planning for replacement in the medium term.` };
  return { cls: 'critical', icon: '🔴', title: 'Poor — Replacement Recommended', desc: `${healthPct}% capacity and ${cycleCount} cycles indicates significant degradation. Battery replacement is advisable to restore full performance.` };
}

  // Render history chart
  if (data.historyRows.length > 2) {
    renderHistoryChart(data.historyRows, data.designCap);

}

function renderHistoryChart(rows, designCap) {
  const canvas = document.getElementById('historyChart');
  if (!canvas) return;

  // Downsample if many rows
  let pts = rows;
  if (pts.length > 80) {
    const step = Math.ceil(pts.length / 80);
    pts = pts.filter((_, i) => i % step === 0);
  }

  const W = canvas.parentElement.offsetWidth || 800;
  canvas.width  = W;
  canvas.height = 180;

  const ctx = canvas.getContext('2d');
  const pad = { top: 15, right: 20, bottom: 40, left: 55 };
  const cw  = W - pad.left - pad.right;
  const ch  = 180 - pad.top - pad.bottom;

  const maxVal = designCap * 1.05;
  const minVal = Math.min(...pts.map(r => r.fc)) * 0.95;

  function xp(i) { return pad.left + (i / (pts.length - 1)) * cw; }
  function yp(v) { return pad.top + ch - ((v - minVal) / (maxVal - minVal)) * ch; }

  ctx.clearRect(0, 0, W, 180);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let j = 0; j <= 4; j++) {
    const y = pad.top + (j / 4) * ch;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    const val = maxVal - (j / 4) * (maxVal - minVal);
    ctx.fillStyle = 'rgba(74,106,128,0.8)';
    ctx.font = '9px "Share Tech Mono"';
    ctx.textAlign = 'right';
    ctx.fillText((val / 1000).toFixed(0) + ' Wh', pad.left - 6, y + 3);
  }

  // Design capacity line
  ctx.strokeStyle = 'rgba(0,229,255,0.2)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  const yDesign = yp(designCap);
  ctx.beginPath();
  ctx.moveTo(pad.left, yDesign);
  ctx.lineTo(W - pad.right, yDesign);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(0,229,255,0.4)';
  ctx.font = '9px "Share Tech Mono"';
  ctx.textAlign = 'left';
  ctx.fillText('Design', W - pad.right + 2, yDesign + 3);

  // Fill gradient
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(0,255,157,0.25)');
  grad.addColorStop(1, 'rgba(0,255,157,0.0)');

  ctx.beginPath();
  ctx.moveTo(xp(0), yp(pts[0].fc));
  for (let i = 1; i < pts.length; i++) ctx.lineTo(xp(i), yp(pts[i].fc));
  ctx.lineTo(xp(pts.length - 1), pad.top + ch);
  ctx.lineTo(xp(0), pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xp(0), yp(pts[0].fc));
  for (let i = 1; i < pts.length; i++) ctx.lineTo(xp(i), yp(pts[i].fc));
  ctx.strokeStyle = '#00ff9d';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X axis labels — sample a few dates
  const labelCount = Math.min(6, pts.length);
  const step = Math.floor((pts.length - 1) / (labelCount - 1));
  ctx.fillStyle = 'rgba(74,106,128,0.8)';
  ctx.font = '9px "Share Tech Mono"';
  ctx.textAlign = 'center';
  for (let k = 0; k < labelCount; k++) {
    const idx = k * step;
    ctx.fillText(pts[idx].date.slice(0, 7), xp(idx), 180 - 8);
  }
}

function resetView() {
  analysis.classList.remove('visible');
  analysis.innerHTML = '';
  dropWrapper.style.display = '';
  fileInput.value = '';
}
