<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF → Markdown</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet"/>

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --border:#334155;
 --gold:#c9a84c;
 --text:#cbd5e1;
 --text-dim:#64748b;
 --text-bright:#f1f5f9;
 --serif:'Cormorant Garamond',serif;
 --mono:'DM Mono',monospace;
 --sans:'DM Sans',sans-serif;
 --doc-serif:'Libre Baskerville',serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans)}

#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.upload-title{font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--text-bright);margin-bottom:1rem}
.upload-title em{color:var(--gold)}
.upload-sub{color:var(--text-dim);margin-bottom:2rem}
.drop-zone{background:var(--card);border:1px solid var(--border);padding:3rem 2rem;border-radius:8px;cursor:pointer;transition:.25s}
.drop-zone:hover{border-color:var(--gold)}
.drop-zone input{display:none}

#loading-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column}
#loading-screen.visible{display:flex}

#result-screen{display:none;padding:3rem 2rem;max-width:1300px;margin:auto}
#result-screen.visible{display:block}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.page-title{font-family:var(--serif);font-size:2rem;color:var(--text-bright)}

.btn{background:var(--card);border:1px solid var(--border);color:var(--text-dim);
 font-family:var(--mono);font-size:.7rem;padding:.5rem 1rem;
 cursor:pointer;border-radius:4px}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.active{border-color:var(--gold);color:var(--gold)}

.mode-toggle{display:flex;gap:.5rem;flex-wrap:wrap}

.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;overflow:auto}
.card-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
textarea{width:100%;height:550px;background:transparent;border:none;color:var(--text);
 font-family:var(--mono);font-size:.85rem;resize:none}
textarea:focus{outline:none}

/* Resume Mode */
.preview.resume h1{font-family:var(--serif);font-size:3rem;font-weight:300;color:var(--text-bright);text-align:center;margin-bottom:.3rem}
.preview.resume h1::after{content:"";display:block;width:120px;height:2px;background:var(--gold);margin:8px auto 20px auto}
.preview.resume h2{font-family:var(--mono);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-top:2rem;margin-bottom:1rem}
.preview.resume li{padding:.4rem 0 .4rem 1rem;position:relative}
.preview.resume li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);position:absolute;left:0;top:12px}

/* Document Mode (your favorite) */
.preview.document{background:#ffffff;color:#111827;padding:2rem}
.preview.document h1{font-family:var(--doc-serif);font-size:2.4rem;margin-bottom:1rem;border-bottom:1px solid #ddd;padding-bottom:.5rem}
.preview.document h2{font-family:var(--doc-serif);font-size:1.5rem;margin-top:2rem;margin-bottom:.8rem}
.preview.document p{margin-bottom:1rem;line-height:1.8}
.preview.document ul{margin-left:1.5rem;margin-bottom:1rem}
.preview.document li{margin-bottom:.4rem}

/* Theme Presets */
.preview.corporate{--gold:#2563eb}
.preview.minimal{--gold:#111827}
.preview.academic{--gold:#7c3aed}

@media(max-width:900px){.output-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="upload-screen">
  <h1 class="upload-title">Convert your <em>PDF</em></h1>
  <p class="upload-sub">Structured extraction. Resume-ready. Document-beautiful.</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="application/pdf"/>
    <div>📄 Click or Drop PDF</div>
  </div>
</div>

<div id="loading-screen">Parsing document…</div>

<div id="result-screen">
  <div class="top-bar">
    <div class="page-title">Markdown Output</div>
    <div class="mode-toggle">
      <button class="btn active" id="resumeMode">Resume</button>
      <button class="btn" id="docMode">Document</button>
      <button class="btn" id="themeCorporate">Corporate</button>
      <button class="btn" id="themeMinimal">Minimal</button>
      <button class="btn" id="themeAcademic">Academic</button>
      <button class="btn" id="downloadRawBtn">Download Raw Markdown</button>
      <button class="btn" id="downloadHtmlBtn">Download Preview as HTML</button>
      <button class="btn" id="resetBtn">New PDF</button>
    </div>
  </div>

  <div class="output-grid">
    <div class="card">
      <div class="card-title">Editable Markdown</div>
      <textarea id="output"></textarea>
    </div>
    <div class="card preview resume corporate" id="previewCard">
      <div class="card-title">Live Preview</div>
      <div id="preview"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){
 const pdfjsLib=window.pdfjsLib;
 pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

 const upload=document.getElementById("upload-screen");
 const loading=document.getElementById("loading-screen");
 const result=document.getElementById("result-screen");
 const fileInput=document.getElementById("fileInput");
 const dropZone=document.getElementById("dropZone");
 const output=document.getElementById("output");
 const preview=document.getElementById("preview");
 const previewCard=document.getElementById("previewCard");

 dropZone.onclick=()=>fileInput.click();
 fileInput.onchange=e=>{if(e.target.files[0]) parsePDF(e.target.files[0])};

 async function parsePDF(file){
  upload.style.display="none";
  loading.style.display="flex";
  const buffer=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buffer}).promise;
  let md="";
  let firstLineCaptured=false;

  for(let p=1;p<=pdf.numPages;p++){
   const page=await pdf.getPage(p);
   const text=await page.getTextContent();
   const items=text.items;
   let lines={};
   items.forEach(i=>{
    const y=Math.round(i.transform[5]);
    if(!lines[y]) lines[y]=[];
    lines[y].push(i);
   });
   Object.keys(lines).sort((a,b)=>b-a).forEach(key=>{
    const row=lines[key].sort((a,b)=>a.transform[4]-b.transform[4]);
    const str=row.map(i=>i.str).join(" ").trim();
    if(!str) return;
    const size=row.reduce((s,i)=>s+i.height,0)/row.length;

    if(!firstLineCaptured && str.split(" ").length<=5 && str===str.toUpperCase()){
      md+=`# ${str}\n\n`;
      firstLineCaptured=true;
    }
    else if(size>18) md+=`# ${str}\n\n`;
    else if(size>14) md+=`## ${str}\n\n`;
    else if(/^[-•●▪]/.test(str)) md+=`- ${str.replace(/^[-•●▪]\s*/,"")}\n`;
    else md+=`${str}\n\n`;
   });
  }
  loading.style.display="none";
  result.classList.add("visible");
  output.value=md.trim();
  renderPreview();
 }

 function renderPreview(){
  const md=output.value;
  let html=md
   .replace(/^# (.*$)/gim,"<h1>$1</h1>")
   .replace(/^## (.*$)/gim,"<h2>$1</h2>")
   .replace(/^- (.*$)/gim,"<li>$1</li>")
   .replace(/\n\n/g,"</p><p>");
  preview.innerHTML="<p>"+html+"</p>";
 }

 output.addEventListener("input",renderPreview);

 document.getElementById("resumeMode").onclick=function(){previewCard.classList.remove("document");previewCard.classList.add("resume");setActive(this)};
 document.getElementById("docMode").onclick=function(){previewCard.classList.remove("resume");previewCard.classList.add("document");setActive(this)};

 document.getElementById("themeCorporate").onclick=function(){setTheme("corporate",this)};
 document.getElementById("themeMinimal").onclick=function(){setTheme("minimal",this)};
 document.getElementById("themeAcademic").onclick=function(){setTheme("academic",this)};

 function setTheme(theme,btn){previewCard.classList.remove("corporate","minimal","academic");previewCard.classList.add(theme);setActive(btn)}
 function setActive(btn){document.querySelectorAll('.mode-toggle .btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

 document.getElementById("downloadRawBtn").onclick=function(){
  const blob=new Blob([output.value],{type:"text/markdown"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="converted.md";
  a.click();
 };

 document.getElementById("downloadHtmlBtn").onclick=function(){
  const style=document.querySelector("style").innerHTML;
  const fullHTML=`<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Preview</title><style>${style}</style></head><body>${previewCard.outerHTML}</body></html>`;
  const blob=new Blob([fullHTML],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="preview.html";
  a.click();
 };

 document.getElementById("resetBtn").onclick=function(){result.classList.remove("visible");upload.style.display="flex";fileInput.value=""};
});
</script>

</body>
</html>
